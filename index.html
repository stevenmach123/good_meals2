<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GOOD MEALS</title>
    <!--[if lt IE 9]><script src="https://html5shim.googlecode.com/svn/trunk/html5.js"></script><![end if]-->
    <link rel="shortcut icon" href="#">
</head>

<style>
    :root {
        --primary: #7bc46b;
        --primary-dark: #5f9f51;
        --card-bg: rgba(22, 32, 24, 0.62);
        --text-soft: #e8f6e4;
        --title: #ffe27a;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(rgba(7, 14, 8, 0.45), rgba(7, 14, 8, 0.45)),
            url(goodmeals.jpg) no-repeat center center fixed;
        background-size: cover;
    }

    #frame {
        width: min(680px, 92vw);
        padding: clamp(24px, 4vw, 40px);
        text-align: center;
        background: var(--card-bg);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        backdrop-filter: blur(6px);
        box-shadow: 0 20px 44px rgba(0, 0, 0, 0.28);
    }

    #title {
        margin: 0;
        font-size: clamp(2.4rem, 7vw, 5rem);
        color: var(--title);
        letter-spacing: 1px;
        text-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
    }

    #tagline {
        margin: 12px 0 28px;
        font-size: clamp(1rem, 2.6vw, 1.2rem);
        color: var(--text-soft);
    }

    #introBtn {
        width: 120px;
        height: 46px;
        font-size: 1rem;
        font-weight: 600;
        color: #10200f;
        background-color: var(--primary);
        border: none;
        border-radius: 999px;
        cursor: pointer;
        transition: transform 0.18s ease, background-color 0.18s ease, box-shadow 0.18s ease;
    }

    #introBtn:hover {
        background-color: var(--primary-dark);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        transform: translateY(-2px);
    }
</style>

<body onload="init()">
    <div id="frame">
        <div id="intro">
            <h1 id="title">Good Meals</h1>
            <p id="tagline">Simple meal planning for healthier days.</p>
            <a href="login.html">
                <button id="introBtn">Log in</button>
            </a>
        </div>
    </div>
</body>
<script type="text/javascript" src="credentials.js"></script>
</html>
